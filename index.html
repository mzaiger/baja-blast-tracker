<script>
  const seenKey = "seenHRs";
  let seen = JSON.parse(localStorage.getItem(seenKey)) || [];

  // 🗓️ Get last 7 days
  function getDateRange() {
    const today = new Date();
    const past = new Date();
    past.setDate(today.getDate() - 6);

    const format = d => d.toISOString().split("T")[0];

    return {
      start: format(past),
      end: format(today)
    };
  }

  async function getGames() {
    const { start, end } = getDateRange();

    const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&startDate=${start}&endDate=${end}`;

    const res = await fetch(url);
    const data = await res.json();

    let games = [];
    data.dates.forEach(date => {
      games = games.concat(date.games);
    });

    return games;
  }

  async function checkHomeRuns() {
    const games = await getGames();

    for (let game of games) {
      const res = await fetch(`https://statsapi.mlb.com/api/v1.1/game/${game.gamePk}/feed/live`);
      const data = await res.json();

      const plays = data.liveData.plays.allPlays;

      plays.forEach(play => {
        if (play.result.event === "Home Run") {

          const distance =
            play.hitData?.totalDistance ||
            play.result?.hitDistance;

          if (distance && distance >= 420) {

            const id = `${game.gamePk}-${play.about.atBatIndex}`;

            if (!seen.includes(id)) {
              seen.push(id);
              localStorage.setItem(seenKey, JSON.stringify(seen));

              showAlert(
                play.matchup.batter.fullName,
                distance,
                game.gameDate
              );
            }
          }
        }
      });
    }
  }

  function showAlert(player, distance, date) {
    const li = document.createElement("li");
    const d = new Date(date).toLocaleDateString();

    li.textContent = `💣 ${player} hit ${distance} ft (${d})`;
    document.getElementById("alerts").prepend(li);

    // 🔔 Notify only for TODAY (optional)
    if (new Date(date).toDateString() === new Date().toDateString()) {
      if (Notification.permission === "granted") {
        new Notification("Baja Blast Alert!", {
          body: `${player} hit ${distance} ft 💣`
        });
      }

      new Audio("https://www.myinstants.com/media/sounds/airhorn.mp3").play();
    }
  }

  Notification.requestPermission();

  setInterval(checkHomeRuns, 15000);
  checkHomeRuns();
</script>
