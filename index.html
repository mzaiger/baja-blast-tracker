<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baja Blast Promotion: Regular Season</title>
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #111827;
            color: #ffffff;
            padding: 2rem;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            max-width: 64rem;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: #22d3ee;
            margin: 0 0 0.25rem 0;
        }

        .subtitle {
            color: #9ca3af;
            margin: 0;
        }

        .col-headers {
            display: none;
            grid-template-columns: 1fr auto auto auto;
            gap: 1rem;
            padding: 0 1rem;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6b7280;
            font-weight: 600;
        }

        .col-headers span.stat-col {
            text-align: center;
            width: 6rem;
        }

        #hr-list {
            display: grid;
            gap: 0.75rem;
        }

        .loading, .empty {
            text-align: center;
            font-style: italic;
            color: #6b7280;
        }

        .empty { font-style: normal; }

        .hr-card {
            background-color: #1f2937;
            border-radius: 0.5rem;
            border-left: 4px solid #22d3ee;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3), 0 4px 6px -4px rgba(0,0,0,0.3);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0 1rem;
            align-items: center;
            padding: 0.75rem 1rem;
        }

        .player-name {
            font-size: 1.125rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .matchup {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 0.125rem;
        }

        .stat-block {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 6rem;
        }

        .stat-block .value {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .stat-block .value.velo { color: #facc15; }
        .stat-block .value.angle { color: #60a5fa; }

        .stat-block .label {
            font-size: 0.75rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .distance-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 6rem;
        }

        .distance-block .value {
            font-size: 1.5rem;
            font-weight: 900;
            color: #22d3ee;
        }

        .distance-block .value .unit {
            font-size: 1rem;
            font-weight: 400;
        }

        .distance-block .label {
            font-size: 0.75rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .mobile-stats {
            grid-column: span 2;
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid #374151;
        }

        .mobile-stats .velo { color: #facc15; font-weight: 600; }
        .mobile-stats .angle { color: #60a5fa; font-weight: 600; }
        .mobile-stats .stat-label {
            margin-left: 0.25rem;
            font-size: 0.75rem;
            color: #6b7280;
        }

        .unit-label, .muted {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .dash { color: #4b5563; }

        @media (min-width: 768px) {
            .col-headers { display: grid; }

            .hr-card {
                grid-template-columns: 1fr auto auto auto;
            }

            .stat-block { display: flex; }

            .mobile-stats { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 Baja Blast Promotion</h1>
            <p class="subtitle">MLB Home Runs ≥ 420ft — <span id="year-sub"></span> Regular Season</p>
        </header>

        <!-- Column headers -->
        <div class="col-headers">
            <span>Player / Matchup</span>
            <span class="stat-col">Exit Velo</span>
            <span class="stat-col">Launch Angle</span>
            <span class="stat-col">Distance</span>
        </div>

        <div id="hr-list">
            <p class="loading">Loading the bombs...</p>
        </div>
    </div>

    <script>
        // Set current year in subtitle and browser tab
        const currentYear = new Date().getFullYear();
        document.getElementById('year-sub').textContent = currentYear;
        document.title = `Baja Blast Promotion: ${currentYear} Regular Season`;

        async function loadHRs() {
            const response = await fetch(`./data.json?v=${Date.now()}`);
            let data = await response.json();
            const container = document.getElementById('hr-list');
            container.innerHTML = '';

            // Sort most recent first — prefer exact timestamp, fall back to game/inning
            data.sort((a, b) => {
                if (a.time_utc && b.time_utc) return b.time_utc.localeCompare(a.time_utc);
                if (a.date !== b.date) return b.date.localeCompare(a.date);
                if (a.game_pk !== b.game_pk) return (b.game_pk || 0) - (a.game_pk || 0);
                return (b.inning || 0) - (a.inning || 0);
            });

            if (data.length === 0) {
                container.innerHTML = '<p class="empty">No 420ft+ homers yet this season. Pitchers are winning.</p>';
                return;
            }

            data.forEach(hr => {
                const velo  = hr.exit_velo    ? `${parseFloat(hr.exit_velo).toFixed(1)} <span class="unit-label">mph</span>`  : '<span class="dash">—</span>';
                const angle = hr.launch_angle ? `${parseFloat(hr.launch_angle).toFixed(1)}<span class="unit-label">°</span>`   : '<span class="dash">—</span>';

                const card = `
                    <div class="hr-card">
                        <div>
                            <div class="player-name">${hr.player}</div>
                            <div class="matchup">${hr.team} vs ${hr.opponent} &bull; ${hr.date}</div>
                        </div>
                        <div class="stat-block">
                            <div class="value velo">${velo}</div>
                            <div class="label">Exit Velo</div>
                        </div>
                        <div class="stat-block">
                            <div class="value angle">${angle}</div>
                            <div class="label">Launch Angle</div>
                        </div>
                        <div class="distance-block">
                            <div class="value">${hr.distance}<span class="unit">'</span></div>
                            <div class="label">Distance</div>
                        </div>
                        <div class="mobile-stats">
                            <div>
                                <span class="velo">${velo}</span>
                                <span class="stat-label">exit velo</span>
                            </div>
                            <div>
                                <span class="angle">${angle}</span>
                                <span class="stat-label">launch angle</span>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        loadHRs();
    </script>
</body>
</html>
