<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>420' Club: Last 7 Days</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-green-400">🔥 The 420' Club</h1>
            <p class="text-gray-400">MLB Home Runs ≥ 420ft in the last 7 days</p>
        </header>

        <div id="hr-list" class="grid gap-4">
            <p class="text-center italic text-gray-500">Loading the bombs...</p>
        </div>
    </div>

    <script>
        async function loadHRs() {
            const response = await fetch('./data.json');
            const data = await response.json();
            const container = document.getElementById('hr-list');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<p class="text-center">No 420ft+ homers in the last 7 days. Pitchers are winning.</p>';
                return;
            }

            data.forEach(hr => {
                const card = `
                    <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-green-500 flex justify-between items-center shadow-lg">
                        <div>
                            <div class="text-xl font-bold">${hr.player}</div>
                            <div class="text-sm text-gray-400">${hr.team} vs ${hr.opponent} • ${hr.date}</div>
                        </div>
                        <div class="text-3xl font-black text-green-400">${hr.distance}'</div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }
        loadHRs();
    </script>
</body>
</html>
